version: "3.8"

services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      POSTGRES_DB: mezon-tutors
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "6543:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CORS_ORIGINS=https://mezon-tutors-web.vercel.app
      - FRONTEND_URL=https://mezon-tutors-web.vercel.app
      - APP_SCHEME=mezon-tutors://
      - RESEND_API_KEY=re_iTHVYDxf_AtQuXDHbrLyqD68jSio8nyAV
      - RESEND_FROM_EMAIL=onboarding@resend.dev
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mezon-tutors
      - JWT_SECRET=secret
      - MEZON_OAUTH_URL=https://oauth2.mezon.ai
      - CLIENT_ID=2004371725344575488
      - CLIENT_SECRET=.@Ga.BqAWyQqw|;O9hXG.RbQLyIqetXG
      - REDIRECT_URI=http://167.172.78.124:4000/api/auth/mezon/callback

volumes:
  pgdata:
